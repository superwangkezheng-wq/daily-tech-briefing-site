<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>每日科技信息 - 维护页</title>
    <link rel="stylesheet" href="/styles.css?v=1.1.3" />
  </head>
  <body>
    <div class="page-shell maintenance-shell">
      <header class="maintenance-header">
        <div>
          <p class="eyebrow">MAINTENANCE</p>
          <h1 class="maintenance-title">站点维护状态</h1>
        </div>
        <a class="maintenance-back" href="/">返回站点</a>
      </header>

      <section class="maintenance-grid">
        <article class="maintenance-card">
          <p class="maintenance-label">服务入口</p>
          <strong id="ops-fixed-url">--</strong>
          <p class="maintenance-text">正式入口由 Cloudflare Tunnel 提供，只开放网页浏览与反馈提交。</p>
        </article>

        <article class="maintenance-card">
          <p class="maintenance-label">最近缓存</p>
          <strong id="ops-cache-time">--</strong>
          <p id="ops-cache-note" class="maintenance-text">--</p>
        </article>

        <article class="maintenance-card">
          <p class="maintenance-label">刷新状态</p>
          <strong id="ops-refresh-result">--</strong>
          <p id="ops-refresh-note" class="maintenance-text">--</p>
        </article>

        <article class="maintenance-card">
          <p class="maintenance-label">反馈汇总</p>
          <strong id="ops-digest-result">--</strong>
          <p id="ops-digest-note" class="maintenance-text">--</p>
        </article>

        <article class="maintenance-card">
          <p class="maintenance-label">最近访问</p>
          <strong id="ops-access-result">--</strong>
          <p id="ops-access-note" class="maintenance-text">--</p>
        </article>
      </section>

      <section class="maintenance-panel">
        <div class="section-head">
          <h3>维护目录</h3>
          <p>网页只展示状态，不提供系统控制能力</p>
        </div>
        <div id="maintenance-paths" class="maintenance-paths"></div>
      </section>
    </div>

    <script src="/maintenance.js"></script>
  </body>
  </html>
